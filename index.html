<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <p class="title">☀ Solar System</p>

  <div class="solar-system">

    <div class="sun"></div>

    <div class="orbit orbit-mercury">
      <div class="planet mercury">
        <span class="label">Mercury</span>
      </div>
    </div>

    <div class="orbit orbit-venus">
      <div class="planet venus">
        <span class="label">Venus</span>
      </div>
    </div>

    <div class="orbit orbit-earth">
      <div class="planet earth">
        <span class="label">Earth</span>

        <div class="moon-orbit">
          <div class="moon"></div>
        </div>
      </div>
    </div>

    <div class="orbit orbit-mars">
      <div class="planet mars">
        <span class="label">Mars</span>
      </div>
    </div>

    <div class="orbit orbit-jupiter">
      <div class="planet jupiter">
        <span class="label">Jupiter</span>
      </div>
    </div>

    <div class="orbit orbit-saturn">
      <div class="planet saturn">
        <span class="label">Saturn</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
